name: CI/CD

on:
  push:
    branches:
      - main
      - principal

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Validar OpenAPI
        run: spectral lint openapi.yaml

  publicar-docs:
    needs: validar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Redoc
        run: npm install -g redoc-cli

      - name: Gerar documentação
        run: redoc-cli build openapi.yaml -o index.html

      - name: Publicar GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
